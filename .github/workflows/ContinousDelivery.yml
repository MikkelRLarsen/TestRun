name: Continous Delivery

on:
  workflow_run:
    workflows: ["Continous Integration"]
    types:
      - completed

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: cicdexample
  TAG: ${{ github.sha }}
  OWNER: mikkelrlarsen

jobs:
  continous_delivery:
    runs-on: ubuntu-latest    
    permissions:
      contents: read
      packages: write     
    if: ${{ 
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'master'
        }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Login against a Docker registry
      # https://github.com/docker/login-action
      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push Docker image
      # https://github.com/docker/build-push-action
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: src/CiCd
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.IMAGE_NAME}}:${{ env.TAG}}
          
  continous_deployment:
    runs-on: self-hosted
    env:
      CONTAINERNAME: cicdexample-container
    permissions:
      contents: read
      packages: read
    needs: continous_delivery
    steps:
      - name: Bypass PowerShell script restrictions
        run: Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass
        shell: pwsh
        
      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Stop existing container
        run: docker stop ${{ env.CONTAINERNAME}} || true
        shell: pwsh

      - name: Remove existing container
        run: docker rm ${{ env.CONTAINERNAME }} || true
        shell: pwsh
        
      - name: Pull latest image
        run: docker pull ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.IMAGE_NAME }}:${{ env.TAG }}
        shell: pwsh

      - name: Run new container
        run: docker run -d -p 8080:8080 --name ${{ env.CONTAINERNAME }} ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.IMAGE_NAME }}:${{ env.TAG }}
        shell: pwsh
